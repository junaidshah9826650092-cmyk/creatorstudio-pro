name: vitox_mobile
description: Vitox Creator Studio Mobile App for iOS and Android.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_tts: ^3.5.0
  webview_flutter: ^4.14.0
  youtube_player_flutter: ^8.0.0
  http: ^1.1.0
  video_player: ^2.8.1
  chewie: ^1.7.1
  google_fonts: ^8.1.0
  flutter_staggered_animations: ^1.1.1
  provider: ^6.0.5
  cached_network_image: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/music_player.html

